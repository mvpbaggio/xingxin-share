name: Build Injected IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build Tweak
      run: |
        set +e
        SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)
        if [ -z "$SDK_PATH" ]; then
          SDK_PATH="/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk"
        fi
        echo "SDK: $SDK_PATH"
        clang -target arm64-apple-ios14.0 -isysroot "$SDK_PATH" -fobjc-arc -dynamiclib \
          -O2 -o XingxinShare.dylib hook_dylib.m \
          -framework UIKit -framework Foundation -lobjc \
          -Wl,-dylib_install_name,@executable_path/XingxinShare.dylib \
          -Wl,-ios_version_min,14.0
        echo "DYLIB_PATH=$(pwd)/XingxinShare.dylib" >> $GITHUB_ENV
        ls -lh XingxinShare.dylib
    
    - name: Download IPA
      run: |
        curl -L "https://github.com/mvpbaggio/xingxin-share/releases/download/v1/xingxin.ipa" \
          -o /tmp/xingxin.ipa -w "HTTP %{http_code}, Size: %{size_download}\n"
    
    - name: Inject into IPA
      run: |
        # 解压IPA
        mkdir -p /tmp/extract
        cd /tmp/extract
        unzip -q /tmp/xingxin.ipa -d extracted/
        APP_PATH=$(find extracted -name "*.app" -type d | head -1)
        echo "App path: $APP_PATH"
        
        # 正确找到主二进制（Mach-O格式，不是js/png等）
        for f in "$APP_PATH"/*; do
          if [ -f "$f" ]; then
            FTYPE=$(file "$f" 2>/dev/null)
            if echo "$FTYPE" | grep -q "Mach-O.*executable"; then
              MACHO="$f"
              echo "Binary: $(basename $MACHO) (Mach-O)"
              break
            fi
          fi
        done
        
        # 复制dylib
        cp "$DYLIB_PATH" "$APP_PATH/"
        
        export MACHO_PATH="$MACHO"
        
        # 使用Python脚本注入
        python3 -c "
import struct, os
MH_MAGIC_64 = 0xfeedfacf
LC_LOAD_DYLIB = 0xc

macho_path = os.environ.get('MACHO_PATH', '')
if not macho_path or not os.path.exists(macho_path):
    print('ERROR: MACHO_PATH not set')
    exit(1)

dylib_name = b'@executable_path/XingxinShare.dylib\x00'
while len(dylib_name) % 4 != 0:
    dylib_name += b'\x00'

with open(macho_path, 'rb') as f:
    data = bytearray(f.read())

magic = struct.unpack_from('<I', data[0:4])[0]
endian = '<' if magic == MH_MAGIC_64 else '>'
(_, _, _, _, ncmds, sizeofcmds, _, _) = struct.unpack_from(f'{endian}IIIIIIII', data[0:32])
print(f'ncmds: {ncmds}, sizeofcmds: {sizeofcmds}')

cmd_size = 24 + len(dylib_name)
dylib_cmd = struct.pack(f'{endian}II', LC_LOAD_DYLIB, cmd_size)
dylib_cmd += struct.pack(f'{endian}III', 24, 0x01000000, 0x01000000)
dylib_cmd += dylib_name

cmds_end = 32 + sizeofcmds
new_data = bytearray(data[:cmds_end]) + dylib_cmd + data[cmds_end:]

vals = list(struct.unpack_from(f'{endian}IIIIIIII', data[0:32]))
vals[4] = ncmds + 1
vals[5] = sizeofcmds + cmd_size
new_header = struct.pack(f'{endian}IIIIIIII', *vals)
new_data[0:32] = new_header

with open(macho_path, 'wb') as f:
    f.write(new_data)

print(f'Done! ncmds: {ncmds} -> {ncmds + 1}')
"
        chmod +x "$MACHO"
        
        # 移除签名
        rm -rf "$APP_PATH/_CodeSignature"
        rm -f "$APP_PATH/embedded.mobileprovision"
        rm -f "$APP_PATH/archived-expanded-entitlements.xcent"
        
        # 重新打包
        cd /tmp/extract/extracted
        zip -qr "/tmp/行信_带分享.ipa" Payload/
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: 行信_带分享
        path: /tmp/行信_带分享.ipa
