name: Build Injected IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup theos
      run: |
        git clone --recursive --depth 1 https://github.com/theos/theos.git /tmp/theos
        echo "THEOS=/tmp/theos" >> $GITHUB_ENV
    
    - name: Build Tweak
      run: |
        export THEOS=/tmp/theos
        export TARGET=iphone:17.0:14.0
        make clean || true
        make package || true
        # 也尝试直接clang编译
        DYLIB=$(find . -name "*.dylib" | head -1)
        if [ -z "$DYLIB" ]; then
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)
          if [ -z "$SDK_PATH" ]; then
            SDK_PATH="/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk"
          fi
          echo "SDK: $SDK_PATH"
          clang -target arm64-apple-ios14.0 -isysroot "$SDK_PATH" -fobjc-arc -dynamiclib \
            -O2 -o XingxinShare.dylib hook_dylib.m \
            -lobjc -Wl,-dylib_install_name,@executable_path/XingxinShare.dylib \
            -Wl,-ios_version_min,14.0
          DYLIB=XingxinShare.dylib
        fi
        echo "DYLIB_PATH=$(pwd)/$DYLIB" >> $GITHUB_ENV
    
    - name: Download IPA
      run: |
        curl -L "https://github.com/mvpbaggio/xingxin-share/releases/download/v1/xingxin.ipa" \
          -o /tmp/xingxin.ipa -w "HTTP %{http_code}, Size: %{size_download}\n"
    
    - name: Inject into IPA
      run: |
        # 解压IPA
        mkdir -p /tmp/extract
        cd /tmp/extract
        unzip -q /tmp/xingxin.ipa -d extracted/
        APP_PATH=$(find extracted -name "*.app" -type d | head -1)
        echo "App path: $APP_PATH"
        
        # 找主二进制
        MACHO=$(find "$APP_PATH" -maxdepth 1 -type f ! -name ".*" ! -name "*.plist" ! -name "*.png" ! -name "*.jpg" | head -1)
        echo "Binary: $(basename $MACHO)"
        
        # 复制dylib
        cp "$DYLIB_PATH" "$APP_PATH/"
        
        # 注入dylib
        # 先用insert_dylib，如果没有则用Python脚本
        if which insert_dylib >/dev/null 2>&1; then
          insert_dylib --strip-codesig --all-yes "@executable_path/$(basename $DYLIB_PATH)" "$MACHO" "${MACHO}_patched"
          mv "${MACHO}_patched" "$MACHO"
        else
          # 编译insert_dylib
          git clone --depth 1 https://github.com/Tyilo/insert_dylib.git /tmp/idl
          clang -O2 /tmp/idl/insert_dylib/main.c -o /tmp/insert_dylib -lcopyfile
          /tmp/insert_dylib --strip-codesig --all-yes "@executable_path/$(basename $DYLIB_PATH)" "$MACHO" "${MACHO}_patched"
          mv "${MACHO}_patched" "$MACHO"
        fi
        chmod +x "$MACHO"
        
        # 移除签名
        rm -rf "$APP_PATH/_CodeSignature"
        rm -f "$APP_PATH/embedded.mobileprovision"
        rm -f "$APP_PATH/archived-expanded-entitlements.xcent"
        
        # 重新打包
        cd /tmp/extract/extracted
        zip -qr "/tmp/行信_带分享.ipa" Payload/
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: 行信_带分享
        path: /tmp/行信_带分享.ipa
