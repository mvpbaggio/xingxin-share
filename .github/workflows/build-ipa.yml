name: Build Dylib Only

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build Tweak
      run: |
        SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)
        clang -target arm64-apple-ios14.0 -isysroot "$SDK_PATH" -fobjc-arc -dynamiclib \
          -O2 -o XingxinShare.dylib hook_dylib.m \
          -framework UIKit -framework Foundation \
          -Wl,-dylib_install_name,@executable_path/XingxinShare.dylib
        echo "DYLIB_PATH=$(pwd)/XingxinShare.dylib" >> $GITHUB_ENV
    
    - name: Upload dylib
      uses: actions/upload-artifact@v4
      with:
        name: XingxinShare.dylib
        path: XingxinShare.dylib
